<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Quill rich text editor -->
    <link
      href="https://cdn.quilljs.com/1.3.7/quill.snow.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="layout">
      <!-- Column 1: Form -->
      <div class="form-column">
        <h2>Content Form</h2>
        <form id="contentForm" novalidate>
          <div class="field">
            <label for="heading">Heading</label>
            <input type="text" id="heading" placeholder="Enter heading" />
            <span class="error" id="headingError"></span>
          </div>

          <div class="field">
            <label>Paragraph</label>
            <div id="quillEditor"></div>
            <span class="error" id="paragraphError"></span>
          </div>

          <div class="field">
            <label for="backgroundImage">Background Image URL</label>
            <input
              type="url"
              id="backgroundImage"
              placeholder="https://example.com/image.jpg"
            />
            <span class="error" id="backgroundImageError"></span>
          </div>

          <div class="field">
            <label for="textColor">Text Color (HEX)</label>
            <div class="color-input-row">
              <input
                type="text"
                id="textColor"
                placeholder="#ffffff"
                maxlength="7"
              />
              <input
                type="color"
                id="colorPicker"
                value="#ffffff"
                title="Pick a color"
              />
            </div>
            <span class="error" id="textColorError"></span>
          </div>

          <button type="submit" id="submitBtn">Submit</button>
          <div class="success-msg" id="successMsg"></div>
        </form>
      </div>

      <!-- Column 2: Preview -->
      <div class="preview-column">
        <h2>Preview</h2>
        <div class="preview-block" id="previewBlock">
          <div class="preview-content" id="previewContent">
            <h3 id="previewHeading">Default Heading</h3>
            <div id="previewParagraph">
              <p>
                This is the default paragraph content. Submit the form to update
                this preview with your own content.
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
